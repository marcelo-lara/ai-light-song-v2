services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-light-song-v2:dev
    working_dir: /app
    tty: true
    stdin_open: true
    volumes:
      - .:/app
      - ./data:/data
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    gpus: all

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
      target: dev
    image: ai-light-song-v2-ui:dev
    working_dir: /srv/ui
    tty: true
    stdin_open: true
    volumes:
      - ./ui:/srv/ui
      - /srv/ui/node_modules
      - ./data:/data:ro
      - ./data/reference:/data/reference
    ports:
      - "8080:8080"